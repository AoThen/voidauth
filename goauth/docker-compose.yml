version: '3.8'

services:
  goauth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: goauth
    ports:
      - "3000:3000"
    volumes:
      - goauth-data:/app/data
    environment:
      - APP_SERVER_ENVIRONMENT=production
      - APP_SERVER_APPURL=http://localhost:3000
      - APP_SERVER_TIMEZONE=Asia/Shanghai
      - APP_DATABASE_PATH=/app/data/goauth.db
      - APP_UI_APPNAME=Goauth
      - APP_LOGGING_LEVEL=info
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  goauth-data:
