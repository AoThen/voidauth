<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b794d4"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0f9"/>
      <stop offset="100%" style="stop-color:#e8e0ed"/>
    </linearGradient>
    <radialGradient id="lockGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#581c87"/>
    </radialGradient>
  </defs>
  
  <!-- 盾牌主体 -->
  <path d="M50 12 L82 26 L82 52 C82 72 66 84 50 88 C34 84 18 72 18 52 L18 26 Z" 
        fill="url(#mainGrad)"/>
  
  <!-- 盾牌内部高光 -->
  <path d="M50 18 L76 30 L76 50 C76 66 62 76 50 80 C38 76 24 66 24 50 L24 30 Z" 
        fill="url(#innerGrad)" opacity="0.25"/>
  
  <!-- G 字母造型 -->
  <g transform="translate(50, 50)">
    <path d="M-14 -20 
             A20 20 0 1 1 -20 0
             L20 0
             L20 -10
             L10 -10
             L10 0
             L-10 0
             A10 10 0 1 0 0 -10
             L0 -20 Z"
          fill="url(#lockGrad)"
          transform="scale(0.85)"/>
    
    <!-- 内部装饰点 -->
    <circle cx="0" cy="-5" r="3.5" fill="#fff" opacity="0.8"/>
  </g>
</svg>