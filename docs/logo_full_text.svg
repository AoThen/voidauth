<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 紫色主题 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b794d4"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <!-- 内部渐变 -->
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0f9"/>
      <stop offset="100%" style="stop-color:#e8e0ed"/>
    </linearGradient>
    <!-- 锁孔渐变 -->
    <radialGradient id="lockGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#581c87"/>
    </radialGradient>
    <!-- 文字渐变 -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  
  <!-- 背景装饰 -->
  <rect x="0" y="0" width="600" height="200" fill="transparent"/>
  
  <!-- 盾牌图标组 -->
  <g transform="translate(90, 100)">
    <!-- 背景圆 -->
    <circle cx="0" cy="0" r="80" fill="url(#mainGrad)" opacity="0.1"/>
    
    <!-- 盾牌主体 -->
    <path d="M0 -65 
             L55 -40 
             L55 35 
             C55 70 30 90 0 100 
             C-30 90 -55 70 -55 35 
             L-55 -40 Z" 
          fill="url(#mainGrad)" 
          stroke="url(#mainGrad)" 
          stroke-width="4"/>
    
    <!-- 盾牌内部高光 -->
    <path d="M0 -52 
             L42 -32 
             L42 32 
             C42 60 22 76 0 86 
             C-22 76 -42 60 -42 32 
             L-42 -32 Z" 
          fill="url(#innerGrad)" 
          opacity="0.25"/>
    
    <!-- G 字母造型 -->
    <g transform="scale(0.9)">
      <path d="M-20 -35 
               A35 35 0 1 1 -35 0
               L35 0
               L35 -18
               L18 -18
               L18 0
               L-18 0
               A18 18 0 1 0 0 -18
               L0 -35 Z"
            fill="url(#lockGrad)"/>
      
      <!-- 内部装饰点 -->
      <circle cx="0" cy="-8" r="6" fill="#fff" opacity="0.8"/>
    </g>
  </g>
  
  <!-- 文字 Goauth -->
  <g transform="translate(200, 120)">
    <text x="0" y="0" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
          font-size="72" 
          font-weight="700" 
          fill="url(#textGrad)">Goauth</text>
  </g>
  
  <!-- 标语 -->
  <text x="200" y="155" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
        font-size="16" 
        font-weight="400" 
        fill="#9ca3af" 
        letter-spacing="2">OIDC PROVIDER</text>
</svg>